<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Registrarse | DEV AGS</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="auth-page">
    <div data-include="/partials/header.html"></div>

    <main class="auth-main">
      <section class="auth-card register-card" aria-labelledby="register-title">
        <h1 id="register-title">Registrarse</h1>
        <button class="google-button" type="button">
          <span class="google-mark" aria-hidden="true">G</span>
          Continuar con Google
        </button>
        <div class="divider"><span>o</span></div>
        <form class="auth-form">
          <label for="name">Nombre</label>
          <input id="name" name="name" type="text" autocomplete="name" />

          <label for="email">Correo electrónico</label>
          <input id="email" name="email" type="email" autocomplete="email" />

          <label for="password">Contraseña</label>
          <div class="password-wrap">
            <input
              id="password"
              name="password"
              type="password"
              autocomplete="new-password"
            />
            <button
              class="icon-button"
              type="button"
              aria-label="Mostrar contraseña"
              data-toggle-password
            >
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path
                  d="M3 3l18 18M10.6 10.6A2 2 0 0 0 13.4 13.4M9.9 5.2A9.8 9.8 0 0 1 12 5c5 0 8.5 4.1 9.6 5.6.3.4.3.9 0 1.3a15 15 0 0 1-3 3.2M6.5 6.7a15.5 15.5 0 0 0-4.1 3.9c-.3.4-.3.9 0 1.3C3.5 13.4 7 17.5 12 17.5c1.2 0 2.3-.2 3.3-.7"
                />
              </svg>
            </button>
          </div>
          <span class="hint">Mínimo 6 caracteres</span>

          <label for="confirm">Confirmar Contraseña</label>
          <div class="password-wrap">
            <input
              id="confirm"
              name="confirm"
              type="password"
              autocomplete="new-password"
            />
            <button
              class="icon-button"
              type="button"
              aria-label="Mostrar contraseña"
              data-toggle-password
            >
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path
                  d="M3 3l18 18M10.6 10.6A2 2 0 0 0 13.4 13.4M9.9 5.2A9.8 9.8 0 0 1 12 5c5 0 8.5 4.1 9.6 5.6.3.4.3.9 0 1.3a15 15 0 0 1-3 3.2M6.5 6.7a15.5 15.5 0 0 0-4.1 3.9c-.3.4-.3.9 0 1.3C3.5 13.4 7 17.5 12 17.5c1.2 0 2.3-.2 3.3-.7"
                />
              </svg>
            </button>
          </div>

          <button class="button button-primary auth-submit" type="submit">
            Registrarse
          </button>
        </form>
        <p class="auth-switch">
          ¿Ya tienes cuenta? <a href="login.html">Iniciar Sesión</a>
        </p>
      </section>
    </main>

    <div data-include="/partials/footer.html"></div>
    <script src="app.js"></script>
  </body>
</html>
